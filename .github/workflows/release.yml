name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - premajor
          - preminor
          - prepatch
          - prerelease

permissions:
  contents: read
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-slim
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. This workflow requires a PAT whose owner can push release commits and tags to main." >&2
            exit 1
          fi

      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit, and tag
        id: bump
        run: |
          pnpm version "${{ inputs.bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json pnpm-lock.yaml
          git commit \
            -m "chore(release): v$VERSION" \
            -m "Co-authored-by: Codex <noreply@openai.com>"
          git tag -a "v$VERSION" -m "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: git push origin HEAD:main --follow-tags

      - run: pnpm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
